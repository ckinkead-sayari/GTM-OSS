# claudeGTM docs site.
#
# Public repo: docs deploy to GitHub Pages automatically via
# .github/workflows/docs.yml (mkdocs gh-deploy -> gh-pages branch).
# After first publish: Settings -> Pages -> deploy from gh-pages
# (GitHub usually configures this once the branch exists), then set
# site_url to https://<owner>.github.io/<repo>/.
#
# Local preview:
#   python3 -m venv .venv-docs && source .venv-docs/bin/activate
#   pip install -r requirements-docs.txt
#   mkdocs serve    # http://127.0.0.1:8000 with auto-reload

site_name: claudeGTM
site_url: https://ckinkead-sayari.github.io/GTM-OSS/
site_description: Persistent context and enforced discipline for GTM work with Claude
repo_url: https://github.com/ckinkead-sayari/GTM-OSS
repo_name: ckinkead-sayari/GTM-OSS
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ckinkead-sayari/GTM-OSS
  generator: false

copyright: Single-user GTM operating system. Fork it, make it yours.

nav:
  - Home: index.md
  - Start Here:
      - Quick Start: start-here/quick-start.md
      - Introduction: start-here/introduction.md
      - Fork Guide: start-here/fork-guide.md
      - New User Setup: start-here/new-user-setup.md
      - An Example Session: start-here/example-session.md
      - Team Adoption: start-here/team-adoption.md
      - Connect Your Stack: start-here/connect-your-stack.md
      - Customize for Your Domain: start-here/customize-for-your-domain.md
      - FAQ & Glossary: start-here/faq.md
  - Concepts:
      - The Preamble: concepts/the-preamble.md
      - The Frameworks: concepts/the-frameworks.md
      - Enforcement Hooks: concepts/enforcement-hooks.md
      - Accretive Knowledge: concepts/accretive-knowledge.md
  - Reference:
      - Frameworks: reference/frameworks.md
      - Knowledge Base: reference/knowledge.md
      - Hooks: reference/hooks.md
      - Scheduled Tasks: reference/scheduled-tasks.md
